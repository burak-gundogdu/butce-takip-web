name: Haber Botu Calistirici

on:
  schedule:
    - cron: '0 */4 * * *' # Her 4 saatte bir otomatik calisir (istegine gore degistirebilirsin)
  workflow_dispatch: # GitHub uzerinden manuel tetikleme butonu koyar

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Botu Calistir (Gemini AI)
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_EMAIL: ${{ secrets.FIREBASE_EMAIL }}
          FIREBASE_PASSWORD: ${{ secrets.FIREBASE_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # GROQ silindi, GEMINI eklendi
        run: python bot.py